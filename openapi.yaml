openapi: 3.0.0
info:
  title: 'PHP API'
  description: 'User management API'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
    description: 'Local server'
paths:
  /v1/users/create.php:
    post:
      tags:
        - Users
      summary: 'Create a new user'
      operationId: c76edd41ebe3245a3d6aa3d83fc83a9c
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - first_name
                - last_name
                - email
                - password
              properties:
                first_name:
                  type: string
                  example: Enoch
                last_name:
                  type: string
                  example: Olisa
                email:
                  type: string
                  format: email
                  example: enoch@example.com
                password:
                  type: string
                  format: password
                  example: StrongPassword123!
                phone:
                  type: string
                  example: '+1 647 123 4567'
                  nullable: true
                address_line1:
                  type: string
                  example: '123 Main Street'
                  nullable: true
                city:
                  type: string
                  example: Milton
                  nullable: true
                province:
                  type: string
                  example: 'ON'
                  nullable: true
                postal_code:
                  type: string
                  example: 'K1A 0B1'
                  nullable: true
                date_of_birth:
                  type: string
                  format: date
                  example: '1990-05-20'
                  nullable: true
              type: object
      responses:
        '201':
          description: 'User created successfully'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'User was created successfully.' }
                type: object
        '409':
          description: 'Email already exists'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'Unable to create user. Email already exists.' }
                type: object
        '503':
          description: 'Service unavailable'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'Unable to create user. Service is currently unavailable.' }
                type: object
  /v1/users/update.php:
    put:
      tags:
        - Users
      summary: 'Update an existing user'
      operationId: a79431a243204b75fd0cadcc7d9674f9
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: enoch@example.com
                first_name:
                  type: string
                  example: Enoch
                  nullable: true
                last_name:
                  type: string
                  example: Olisa
                  nullable: true
                phone:
                  type: string
                  example: '+1 647 123 4567'
                  nullable: true
                address_line1:
                  type: string
                  example: '123 Main Street'
                  nullable: true
                city:
                  type: string
                  example: Milton
                  nullable: true
                province:
                  type: string
                  example: 'ON'
                  nullable: true
                postal_code:
                  type: string
                  example: 'K1A 0B1'
                  nullable: true
                date_of_birth:
                  type: string
                  format: date
                  example: '1990-05-20'
                  nullable: true
              type: object
      responses:
        '200':
          description: 'User updated successfully'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'User updated successfully.' }
                type: object
        '400':
          description: 'Bad request'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'No valid updateable fields were provided.' }
                type: object
        '404':
          description: 'User does not exist'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'User does not exist.' }
                type: object
tags:
  -
    name: Users
    description: Users
