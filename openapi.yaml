openapi: 3.0.0
info:
  title: 'PHP API'
  description: 'API for User Management and Session Control (2026 Standards)'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
    description: 'Local Development Server'
paths:
  /v1/sessions/login.php:
    post:
      tags:
        - Sessions
      summary: 'User Login'
      operationId: dfd64d2c4155e373117b9442fc5d3ccf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: enoch@example.com
                password:
                  type: string
                  example: StrongPassword123!
              type: object
      responses:
        '200':
          description: 'Login successful. Sets HTTP-only session cookie.'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'Login successful.' }
                  user: { properties: { id: { type: integer, example: 42 }, email: { type: string, example: enoch@example.com } }, type: object }
                type: object
        '401':
          description: 'Invalid credentials'
        '400':
          description: 'Incomplete data'
  /v1/sessions/logout.php:
    post:
      tags:
        - Sessions
      summary: 'User Logout'
      operationId: e5534657613f60935c4d7ef730b01116
      responses:
        '200':
          description: 'Session destroyed and cookie cleared.'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'Logout successful.' }
                type: object
  /v1/users/create.php:
    post:
      tags:
        - Users
      summary: 'Register a new user'
      operationId: c76edd41ebe3245a3d6aa3d83fc83a9c
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - first_name
                - last_name
                - email
                - password
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                phone:
                  type: string
                  nullable: true
                date_of_birth:
                  type: string
                  format: date
                  nullable: true
              type: object
      responses:
        '201':
          description: 'User created'
        '409':
          description: 'Email already exists'
  /v1/users/view.php:
    get:
      tags:
        - Users
      summary: 'View active user profile'
      description: 'Retrieves current user details from DB based on active session email.'
      operationId: b1ea1cd9410526ebed47b637b2ad99e2
      responses:
        '200':
          description: 'Authenticated profile data retrieved'
          content:
            application/json:
              schema:
                properties:
                  authenticated: { type: boolean, example: true }
                  user: { properties: { first_name: { type: string }, last_name: { type: string }, phone: { type: string, nullable: true }, address_line1: { type: string, nullable: true }, city: { type: string, nullable: true }, province: { type: string, nullable: true }, postal_code: { type: string, nullable: true }, date_of_birth: { type: string, format: date, nullable: true } }, type: object }
                type: object
        '401':
          description: 'Unauthenticated - No active session'
        '404':
          description: 'User record no longer exists in DB'
  /v1/users/update.php:
    put:
      tags:
        - Users
      summary: 'Update existing user'
      operationId: a79431a243204b75fd0cadcc7d9674f9
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
              properties:
                email:
                  description: 'Must match session email'
                  type: string
                first_name:
                  type: string
                  nullable: true
                last_name:
                  type: string
                  nullable: true
                phone:
                  type: string
                  nullable: true
                address_line1:
                  type: string
                  nullable: true
                city:
                  type: string
                  nullable: true
                province:
                  type: string
                  nullable: true
                postal_code:
                  type: string
                  nullable: true
                date_of_birth:
                  type: string
                  format: date
                  nullable: true
              type: object
      responses:
        '200':
          description: 'Profile updated successfully'
        '401':
          description: 'Not logged in'
        '403':
          description: 'Forbidden - Email mismatch with session'
tags:
  -
    name: Sessions
    description: Sessions
  -
    name: Users
    description: Users
